# Foundry configuration for Pulse contracts
# https://docs.arc.network/arc/tutorials/deploy-on-arc

# Arc Testnet RPC
ARC_TESTNET_RPC_URL="https://rpc.testnet.arc.network"

# Private key for deployment (from `cast wallet new`)
# NEVER commit this to version control!
PRIVATE_KEY=""

# Etherscan API (not needed for Arc Testnet)
ETHERSCAN_API_KEY=""

# Auto-detect HTTP endpoint for Chain ID
rpc_endpoint = "https://rpc.testnet.arc.network"

[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200

[foundry]
# Foundry profile configuration
profile = "default"