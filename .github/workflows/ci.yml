name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check (Backend)
        run: |
          cd server
          npx tsc --noEmit

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Lint
        run: npm run lint || true